name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: doubow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d doubow"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DOUBOW_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/doubow
      DOUBOW_REDIS_URL: redis://localhost:6379/0
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - name: Alembic upgrade
        run: alembic upgrade head
      - name: Pytest
        run: pytest -q --tb=line

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -t doubow-api:ci ./api
      - name: Build web image
        run: docker build -t doubow-web:ci ./web

  phase1-gate:
    name: Phase 1 Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Phase 1 gate
        run: bash scripts/phase1_gate.sh

