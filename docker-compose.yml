services:
  postgres:
    # pgvector extension required for résumé embeddings (Phase 1) and matching (Phase 2).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: doubow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doubow"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ./api
    env_file:
      - ./api/.env
    environment:
      DOUBOW_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/doubow
      DOUBOW_CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
      DOUBOW_JWT_SECRET: dev_only_change_me
      DOUBOW_REDIS_URL: redis://redis:6379/0
      # Queue Remote OK + Adzuna (+ Scrapling if SCRAPLING_ENABLED) once per lock window; see beat service for recurring schedule.
      DOUBOW_BOOTSTRAP_INGEST_ON_STARTUP: "true"
      # Inside Compose, MinIO is reachable on the service hostname (not localhost).
      DOUBOW_S3_ENDPOINT_URL: http://minio:9000
      # IMPORTANT: don't set DOUBOW_CLERK_* here.
      # If Compose expands an unset host var to an empty string, it overrides env_file values.
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ./api
    env_file:
      - ./api/.env
    environment:
      DOUBOW_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/doubow
      DOUBOW_CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
      DOUBOW_JWT_SECRET: dev_only_change_me
      DOUBOW_REDIS_URL: redis://redis:6379/0
      DOUBOW_S3_ENDPOINT_URL: http://minio:9000
    command:
      [
        "celery",
        "-A",
        "app.celery_app.celery_app",
        "worker",
        "-l",
        "INFO",
        "-Q",
        "default,scrape,score,draft,notify",
      ]
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      api:
        condition: service_started

  beat:
    build:
      context: ./api
    env_file:
      - ./api/.env
    environment:
      DOUBOW_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/doubow
      DOUBOW_CORS_ALLOW_ORIGINS: '["http://localhost:3000"]'
      DOUBOW_JWT_SECRET: dev_only_change_me
      DOUBOW_REDIS_URL: redis://redis:6379/0
      DOUBOW_S3_ENDPOINT_URL: http://minio:9000
    command:
      [
        "celery",
        "-A",
        "app.celery_app.celery_app",
        "beat",
        "-l",
        "INFO",
      ]
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_started

  web:
    image: node:20.11.1
    working_dir: /app
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
    command: ["npm", "run", "dev", "--", "--port", "3000", "--hostname", "0.0.0.0"]
    depends_on:
      - api

volumes:
  minio-data:

