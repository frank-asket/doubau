
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:#0f1117;--acc:#1a5cff;--a50:#e8eeff;--a800:#0C447C;
  --g50:#EAF3DE;--g600:#3B6D11;--g800:#27500A;
  --r50:#FCEBEB;--r400:#E24B4A;--r800:#791F1F;
  --am50:#FAEEDA;--am400:#BA7517;--am800:#633806;
  --pu50:#EEEDFE;--pu800:#3C3489;
  --P:var(--color-background-primary);
  --S:var(--color-background-secondary);
  --b:var(--color-border-tertiary);
  --b2:var(--color-border-secondary);
  --t:var(--color-text-primary);
  --t2:var(--color-text-secondary);
  --t3:var(--color-text-tertiary);
  --rmd:var(--border-radius-md);
  --rlg:var(--border-radius-lg);
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.w{padding:1rem 0}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:0.5px solid var(--b2)}
.nb{padding:5px 12px;border-radius:var(--rmd);font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:0.5px solid var(--b);color:var(--t2);transition:all .15s}
.nb:hover{background:var(--S);color:var(--t)}
.nb.on{background:var(--sb);color:#fff;border-color:var(--sb)}
.pnl{display:none}.pnl.on{display:block}
.lbl{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin:16px 0 8px}
.lbl:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.card{background:var(--P);border:0.5px solid var(--b);border-radius:var(--rlg);padding:14px}
.sm{background:var(--P);border:0.5px solid var(--b);border-radius:var(--rmd);padding:10px}
.row{display:flex;align-items:flex-start;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--b);font-size:12px;gap:8px}
.row:last-child{border-bottom:none}
.rk{color:var(--t2);flex-shrink:0}
.rv{color:var(--t);font-family:var(--font-mono);font-size:11px;text-align:right}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:500}
.pb{background:var(--a50);color:var(--a800)}
.pg{background:var(--g50);color:var(--g800)}
.pr{background:var(--r50);color:var(--r800)}
.pa{background:var(--am50);color:var(--am800)}
.pp{background:var(--pu50);color:var(--pu800)}
.pgr{background:var(--S);color:var(--t2);border:0.5px solid var(--b)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.bp{background:var(--acc);color:#fff}
.bo{background:transparent;color:var(--t);border:0.5px solid var(--b2)}
.bg{background:var(--g50);color:var(--g800)}
.br{background:var(--r50);color:var(--r800)}
.bsm{padding:3px 10px;font-size:11px}
.bar{background:var(--S);border-radius:99px;height:5px;overflow:hidden}
.bf{height:100%;border-radius:99px}
.inp{width:100%;border:0.5px solid var(--b2);border-radius:var(--rmd);padding:6px 10px;font-size:12px;font-family:inherit;color:var(--t);background:var(--P);outline:none}
.shell{display:flex;border-radius:var(--rmd);overflow:hidden;border:0.5px solid var(--b)}
.msb{width:92px;background:var(--sb);flex-shrink:0}
.sl{display:flex;align-items:center;gap:5px;padding:10px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px}
.sd{width:13px;height:13px;border-radius:3px;background:var(--acc);flex-shrink:0}
.sn{color:#fff;font-size:9px;font-weight:500}
.si{padding:5px 9px;font-size:9px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:4px}
.si i{font-size:10px}
.si.a{background:#1e2b4a;color:#fff}
.main{flex:1;display:flex;flex-direction:column;background:var(--P)}
.tb{height:30px;border-bottom:0.5px solid var(--b);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.tt{font-size:11px;font-weight:500;flex:1;color:var(--t)}
.av{width:18px;height:18px;border-radius:50%;background:var(--acc);font-size:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.con{flex:1;padding:9px;overflow:hidden;background:var(--S)}
.dvd{height:0.5px;background:var(--b);margin:12px 0}
</style>

<div class="w">
<h2 class="sr-only">Doubow design system — continued screen specs: job detail, career steps, notifications, search, interview prep, career copilot empty state, and global responsive rules</h2>

<div class="nav" id="nav2"></div>
<div id="panels2"></div>
</div>

const nav=document.getElementById('nav2');
const panels=document.getElementById('panels2');
screens.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='nb'+(i===0?' on':'');
  btn.textContent=s.label;
  btn.onclick=()=>{
    document.querySelectorAll('#nav2 .nb').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('#panels2 .pnl').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('p2-'+s.id).classList.add('on');
  };
  nav.appendChild(btn);
  const div=document.createElement('div');
  div.className='pnl'+(i===0?' on':'');
  div.id='p2-'+s.id;
  div.innerHTML=s.html();
  panels.appendChild(div);
});
</script>
